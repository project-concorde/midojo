# OGX (LlamaStack) server config for the midojo weather agent.
#
# Start with:
#   LITELLM_API_KEY=... LITELLM_API_URL=... ogx run suites/weather/ogx_agent/run.yaml
#
# The Responses API executes MCP tools server-side. This is the vector tested
# by ogx-ai/ogx#5036: server-side tool results bypass guardrails.
#
# Safety: set SAFETY_MODEL to a model available through the inference backend
# (e.g. a Llama Guard model). For protectai/deberta, a NeMo Guardrails service
# is required — uncomment the remote::nvidia safety provider below and set
# NEMO_GUARDRAILS_URL.

version: 2
distro_name: midojo-weather
apis:
- inference
- responses
- safety
- tool_runtime
- vector_io
- files
providers:
  inference:
  - provider_id: litellm
    provider_type: remote::vllm
    config:
      base_url: ${env.LITELLM_API_URL}
      api_token: ${env.LITELLM_API_KEY}
      max_tokens: 4096
  safety:
  - provider_id: llama-guard
    provider_type: inline::llama-guard
    config:
      excluded_categories: []
  # Uncomment for protectai/deberta via NeMo Guardrails:
  # - provider_id: nvidia-nemo
  #   provider_type: remote::nvidia
  #   config:
  #     guardrails_service_url: ${env.NEMO_GUARDRAILS_URL}
  #     config_id: protectai-deberta
  responses:
  - provider_id: builtin
    provider_type: inline::builtin
    config:
      persistence:
        agent_state:
          namespace: agents
          backend: kv_default
        responses:
          table_name: responses
          backend: sql_default
  tool_runtime:
  - provider_id: model-context-protocol
    provider_type: remote::model-context-protocol
  files:
  - provider_id: builtin-files
    provider_type: inline::localfs
    config:
      storage_dir: ${env.FILES_STORAGE_DIR:=~/.ogx/distributions/midojo-weather/files}
      metadata_store:
        table_name: files_metadata
        backend: sql_default
  vector_io:
  - provider_id: faiss
    provider_type: inline::faiss
    config:
      persistence:
        namespace: vector_io::faiss
        backend: kv_default
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.ogx/distributions/midojo-weather}/kvstore.db
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.ogx/distributions/midojo-weather}/sql_store.db
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
    conversations:
      table_name: openai_conversations
      backend: sql_default
registered_resources:
  models:
  - model_id: llama-scout-17b
    provider_id: litellm
    provider_model_id: llama-scout-17b
    model_type: llm
    metadata: {}
  - model_id: litellm/Llama-Guard-3-1B
    provider_id: litellm
    provider_model_id: Llama-Guard-3-1B
    model_type: llm
    metadata: {}
  shields:
  - shield_id: llama-guard
    provider_id: llama-guard
    provider_shield_id: litellm/Llama-Guard-3-1B
  # Uncomment for deberta via NeMo:
  # - shield_id: nemo-deberta
  #   provider_id: nvidia-nemo
  #   provider_shield_id: nemo-model
server:
  port: 8321
safety:
  default_shield_id: llama-guard
