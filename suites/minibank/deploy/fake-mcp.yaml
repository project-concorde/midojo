apiVersion: apps/v1
kind: Deployment
metadata:
  name: minibank-fake-mcp
  labels:
    app.kubernetes.io/part-of: midojo-minibank
    app.kubernetes.io/component: fake-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: fake-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: midojo-minibank
        app.kubernetes.io/component: fake-mcp
    spec:
      containers:
        - name: fake-mcp
          image: midojo
          command:
            - minibank-fake-mcp-serve
            - --host
            - 0.0.0.0
            - --port
            - "8082"
            - --upstream-url
            - http://minibank-real-mcp:8083/mcp
          env:
            # The fake MCP reads the active evaluation's injections from the
            # control plane's /current/* endpoints.
            - name: MIDOJO_URL
              value: http://minibank-control-plane:8080
          ports:
            - containerPort: 8082
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: minibank-fake-mcp
  labels:
    app.kubernetes.io/part-of: midojo-minibank
spec:
  selector:
    app.kubernetes.io/component: fake-mcp
  ports:
    - port: 8082
      targetPort: 8082
