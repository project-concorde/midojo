apiVersion: apps/v1
kind: Deployment
metadata:
  name: minibank-real-mcp
  labels:
    app.kubernetes.io/part-of: midojo-minibank
    app.kubernetes.io/component: real-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: real-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: midojo-minibank
        app.kubernetes.io/component: real-mcp
    spec:
      containers:
        - name: real-mcp
          image: midojo
          command: ["minibank-real-mcp-serve", "--host", "0.0.0.0", "--port", "8083"]
          ports:
            - containerPort: 8083
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: minibank-real-mcp
  labels:
    app.kubernetes.io/part-of: midojo-minibank
spec:
  selector:
    app.kubernetes.io/component: real-mcp
  ports:
    - port: 8083
      targetPort: 8083
