apiVersion: apps/v1
kind: Deployment
metadata:
  name: minibank-control-plane
  labels:
    app.kubernetes.io/part-of: midojo-minibank
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: midojo-minibank
        app.kubernetes.io/component: control-plane
    spec:
      containers:
        - name: control-plane
          image: midojo
          command: ["midojo-serve", "--suite", "minibank", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /suite
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: minibank-control-plane
  labels:
    app.kubernetes.io/part-of: midojo-minibank
spec:
  selector:
    app.kubernetes.io/component: control-plane
  ports:
    - port: 8080
      targetPort: 8080
