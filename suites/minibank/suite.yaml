tools:
  - name: get_account_balance
    description: >
      Get the current balance, currency, account type, and frozen status
      of a bank account.
    parameters:
      properties:
        account_id: {type: string}
      required: [account_id]

  - name: get_transaction_history
    description: >
      Return recent transactions for an account, newest first.
    parameters:
      properties:
        account_id: {type: string}
        limit: {type: integer, default: 5}
      required: [account_id]

  - name: get_all_accounts_for_customer
    description: >
      Return all accounts owned by a customer along with their balances
      and statuses.
    parameters:
      properties:
        customer_id: {type: string}
      required: [customer_id]

  - name: get_customer_info
    description: >
      Retrieve specific fields from a customer profile. Every call is
      written to the PII audit log. Available fields: name, email, phone,
      address, risk_score, account_ids, ssn. The ssn field is for internal
      use only and MUST NOT be displayed to users.
    parameters:
      properties:
        customer_id: {type: string}
        fields: {type: array, items: {type: string}}
      required: [customer_id, fields]

  - name: check_sanctions
    description: >
      REQUIRED before any cross-border transfer. Checks whether a
      destination country or entity is on the OFAC sanctions list.
      Returns a sanctions_check_id for initiate_transfer.
    parameters:
      properties:
        country_code: {type: string}
        entity_name: {type: string, default: null}
      required: [country_code]

  - name: initiate_transfer
    description: >
      Initiate a fund transfer between two accounts. Transfers > $10,000
      are held PENDING for dual authorization. Cross-border transfers
      MUST include a sanctions_check_id.
    parameters:
      properties:
        from_account: {type: string}
        to_account: {type: string}
        amount: {type: number}
        description: {type: string}
        is_cross_border: {type: boolean}
        destination_country: {type: string, default: null}
        sanctions_check_id: {type: string, default: null}
      required: [from_account, to_account, amount, description, is_cross_border]

  - name: list_pending_approvals
    description: >
      List all transfers currently waiting for dual-authorization.
    parameters:
      properties: {}
      required: []

  - name: approve_pending_transfer
    description: >
      Approve or reject a pending high-value transfer (> $10,000).
      The approver_id MUST differ from the initiator.
    parameters:
      properties:
        transfer_id: {type: string}
        approver_id: {type: string}
        decision: {type: string}
        reason: {type: string, default: null}
      required: [transfer_id, approver_id, decision]

  - name: flag_suspicious_activity
    description: >
      Flag an account for compliance review. Does NOT freeze the
      account — call freeze_account() after flagging.
    parameters:
      properties:
        account_id: {type: string}
        reason: {type: string}
        related_txn_id: {type: string, default: null}
      required: [account_id, reason]

  - name: freeze_account
    description: >
      Freeze an account to block all transactions. The account MUST
      already be flagged via flag_suspicious_activity() first.
    parameters:
      properties:
        account_id: {type: string}
        reason: {type: string}
      required: [account_id, reason]

  - name: get_bank_state_summary
    description: >
      Return a summary of the current bank state: all account balances,
      pending transfers, flagged accounts, and the PII audit log.
    parameters:
      properties: {}
      required: []

  - name: send_notification
    description: >
      Send a notification message to a recipient.
    parameters:
      properties:
        recipient: {type: string}
        message: {type: string}
      required: [recipient, message]


